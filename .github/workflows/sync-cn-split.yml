- name: 运行同步脚本
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PROFILE_ID: ${{ secrets.CF_PROFILE_ID }}
          MODE: exclude
        run: |
          echo "当前目录文件列表："
          ls -F
          echo "--- 查看文件头部 ---"
          head -n 10 cf-zt-cn-split.py
          echo "--- 开始执行 ---"
          python cf-zt-cn-split.py
