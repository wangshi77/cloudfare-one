name: Sync Cloudflare Split Tunnels (ios)

on:
  # 每天 UTC 时间 0:00 (北京时间 8:00) 自动执行
  schedule:
    - cron: '0 0 * * *'
  # 支持手动在 GitHub Actions 页面点击 "Run workflow" 触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 把代码拉取到运行环境
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3. 安装必要的依赖库
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. 执行同步脚本，并传入环境变量
      - name: Run sync script
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.cfat_Y8mLtKHpGAwYk9cXlKuqsOgyPdDObnSW7TlyPmKmc7b77de7 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.6fffa32a503ef35a744ef3243f4003f2 }}
        run: python cf-zt-cn-split.py
