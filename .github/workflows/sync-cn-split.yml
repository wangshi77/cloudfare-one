name: Sync Cloudflare Split Tunnels

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间 8:00 执行
  workflow_dispatch:      # 允许手动在网页点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          # 这一行会自动从 GitHub Secrets 提取你存的值，安全且正确
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: python cf-zt-cn-split.py
